<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VisaFlow API Moved</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f3ef;
        color: #24180d;
      }

      main {
        width: min(92vw, 720px);
        padding: 32px;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(106, 57, 10, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.7;
        color: #5a4b3c;
      }

      code {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: #fff1e3;
        color: #9a560d;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>API Endpoint Moved</h1>
      <p>
        The standalone Nest API deployment has been retired for this project.
      </p>
      <p>
        All active API routes now run from the main VisaFlow web deployment on
        Vercel.
      </p>
      <code>Use the web app domain for current API access</code>
    </main>
  </body>
</html>
